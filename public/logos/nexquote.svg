<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="NEXQUOTE mark">
  <defs>
    <linearGradient id="nqShell" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A" />
      <stop offset="1" stop-color="#172033" />
    </linearGradient>
    <linearGradient id="nqAccent" x1="30" y1="30" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29A3FF" />
      <stop offset="1" stop-color="#7DD3FC" />
    </linearGradient>
    <linearGradient id="nqTail" x1="60" y1="40" x2="100" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29A3FF" />
      <stop offset="1" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  <!-- Nex/Quote hexagon shell -->
  <path
    d="M60 6L104 28Q112 32 112 42V78Q112 88 104 92L60 114L16 92Q8 88 8 78V42Q8 32 16 28L60 6Z"
    fill="url(#nqShell)"
    stroke="#29A3FF"
    stroke-opacity="0.55"
    stroke-width="2.2"
  />
  <!-- "N" upstroke -->
  <path
    d="M36 82V40L56 64V38"
    stroke="url(#nqAccent)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- quote/search lens -->
  <circle cx="76" cy="58" r="18" stroke="#FFFFFF" stroke-width="6" fill="none" />
  <path d="M88 70L100 82" stroke="url(#nqTail)" stroke-width="5" stroke-linecap="round" fill="none" />
  <circle cx="103" cy="85" r="2.7" fill="#06B6D4" />
</svg>
